<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>Krokowoord</title>
</head>

<body>
    <div id="app">
        <header class="game-header">
            <h1>Krokowoord</h1>
            <p>Collect letters in order to build the word KROKOWOORD.</p>
        </header>

        <main class="game-shell">
            <div id="game-container"></div>
        </main>

        <section class="game-help" aria-label="Game controls">
            <p><strong>Controls:</strong> Left/Right Arrows or A/D to move, Up Arrow or W to jump, and the on-screen button to move right.</p>
        </section>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
